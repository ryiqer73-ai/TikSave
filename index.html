<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TikSave</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: url('mybg.jpg') no-repeat center center fixed; background-size: cover; filter: contrast(1.2) saturate(1.4) brightness(1.1); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        .container { background: rgba(255, 255, 255, 0.15); padding: 30px; border-radius: 20px; backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.4); text-align: center; width: 450px; z-index: 2; box-shadow: 0 15px 50px rgba(0,0,0,0.5); }
        .page { display: black; }
        .active-page { display: block; }
        input { padding: 15px; width: 85%; border-radius: 15px; border: none; margin-bottom: 15px; text-align: center; font-size: 16px; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; color: white; background: rgba(255,255,255,0.25); font-weight: bold; margin: 5px; transition: 0.3s; }
        .nav { margin-top: 20px; font-size: 14px; }
        .nav a { color: #fff; text-decoration: none; margin: 0 10px; opacity: 0.8; }
        .nav a:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div id="home" class="page active-page">
            <h2>TikSave</h2>
            <input type="text" id="link" placeholder="ضع رابط تيك توك هنا...">
            <br>
            <button class="btn" onclick="pasteLink()">لصق</button>
            <button class="btn" onclick="Download()">تحميل</button>
        </div>

        <div id="privacy" class="page">
            <h2>سياسة الخصوصية</h2>
            <p style="font-size: 12px; text-align: right;">نحن في TikSave نحترم خصوصيتك. لا نقوم بتخزين أي روابط تقوم بتحميلها. الموقع يستخدم ملفات تعريف الارتباط لتحسين تجربتك وتقديم إعلانات مناسبة.</p>
        </div>

        <div id="contact" class="page">
            <h2>اتصل بنا</h2>
            <p>للتواصل معنا بخصوص أي استفسار أو بلاغ:</p>
            <p><b>ryiqer73@gmail.com</b></p>
        </div>

        <div class="nav">
            <a href="#" onclick="showPage('home')">الرئيسية</a> |
            <a href="#" onclick="showPage('privacy')">سياسة الخصوصية</a> |
            <a href="#" onclick="showPage('contact')">اتصل بنا</a>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
        }

        async function pasteLink() {
            document.getElementById('link').value = await navigator.clipboard.readText();
        }

        async function downloadSmart() {
            const link = document.getElementById('link').value;
            if(!link) return;
            const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(link)}`;
            
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                if (data.data) {
                    const url = data.data.hdplay || data.data.play;
                    triggerDownload(url, "video_HD.mp4");
                }
            } catch (err) { alert("حدث خطأ، تأكد من الرابط"); }
        }

        function triggerDownload(url, filename) {
            fetch(url).then(res => res.blob()).then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
            });
        }
    </script>
</body>
</html>
